# Flatpak manifest template for scrybe.
#
# Render against a published GitHub Release tag and submit to Flathub
# via a PR against `flathub/dev.scrybe.scrybe`. The Flathub buildbot
# rebuilds from source under a sandbox; the cargo-dist tarballs are
# not consumed directly. The `commit:` field below pins the source
# git tree to the release tag, so build reproducibility flows from
# `cargo build --locked` against the pinned `Cargo.lock`.
#
# Placeholders:
#   {{ tag }}                — release tag including the leading `v`
#                              (e.g. `v0.9.0-rc1`).

app-id: dev.scrybe.scrybe
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: scrybe
finish-args:
  - --share=ipc
  - --share=network
  - --device=dri
  # PipeWire system-audio capture per `system-design.md` §4.1 (Linux).
  # The `--filesystem=xdg-data/scrybe:create` line gives the binary a
  # dedicated data dir; user-meeting notes go to `~/scrybe/` which the
  # user opens up with `flatpak override --user
  # --filesystem=home/scrybe:create dev.scrybe.scrybe` if they want
  # the canonical layout.
  - --socket=pipewire
  - --filesystem=xdg-data/scrybe:create
modules:
  - name: scrybe
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/scrybe/cargo
    build-commands:
      - cargo --offline build --release --locked --no-default-features
        --package scrybe-cli --features cli-shell,hook-git
      - install -Dm755 target/release/scrybe /app/bin/scrybe
      - install -Dm644 LICENSE /app/share/licenses/scrybe/LICENSE
    sources:
      - type: git
        url: https://github.com/Mathews-Tom/scrybe.git
        tag: "{{ tag }}"
      # `cargo-sources.json` is generated by `flatpak-cargo-generator.py`
      # against `Cargo.lock` at the rendering step. The Flathub buildbot
      # consumes it to populate the offline cargo cache. Do NOT commit
      # the generated file here; it bloats the in-tree template by
      # ~1 MB. See packaging/README.md for the regeneration recipe.
      - cargo-sources.json
