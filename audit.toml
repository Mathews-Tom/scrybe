# cargo-audit configuration for the workspace.
#
# Companion to `deny.toml` (cargo-deny). cargo-audit reads its own
# config and ignores `deny.toml`'s `[advisories.ignore]` list, so any
# advisory that needs ignoring has to be enumerated in both files.
# Each entry MUST cite why the advisory cannot be acted on now and
# what unblocks dropping the entry.
#
# cargo-audit semantics: "vulnerability" advisories hard-fail by
# default; "unsound", "notice", and "unmaintained" categories surface
# as warnings (the "10 allowed warnings" in CI output). Only
# vulnerability-class advisories typically need explicit ignores;
# the workspace's other RUSTSEC entries (RUSTSEC-2026-0008 git2,
# RUSTSEC-2024-0429 glib, the gtk-rs cluster) are unsound or
# unmaintained categories that cargo-audit already permits.

[advisories]
ignore = [
    # `idna 0.5.x` accepts certain malformed Punycode labels that
    # should be rejected; patched in `idna 1.0.0`. Lockfile still
    # carries `idna 0.5.x` via the `url 2.5.0` precise pin enforced
    # in the workspace `Cargo.toml`. The toolchain bumped to rustc
    # 1.95 in `rust-toolchain.toml`, so the MSRV no longer blocks
    # `idna 1.x`; what remains is a deliberate `cargo update` run
    # that regenerates the lock cascade. Drop this ignore once that
    # update lands. Exposure surface is IDN-aware URL parsing; the
    # only consumer of the affected chain is `Hook::Git` (via
    # `git2 → url`), which parses local-repo paths and conventional
    # git remote URLs (HTTPS/SSH without internationalized domain
    # names), so the affected Punycode validation is not exercised.
    "RUSTSEC-2024-0421",
]
