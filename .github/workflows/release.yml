# Release workflow for scrybe-cli driven by cargo-dist 0.25.
#
# Trigger:
# - Push of a tag matching `v[0-9]+.[0-9]+.[0-9]+*` (e.g. v0.1.0, v0.1.0-rc1).
# - `workflow_dispatch` for dry-run validation; the dispatch path runs `plan`
#   and `build` but does NOT create a GitHub Release.
#
# Outputs (per `[workspace.metadata.dist]` in `Cargo.toml`):
# - `scrybe-cli-aarch64-apple-darwin.tar.xz`
# - `scrybe-cli-x86_64-apple-darwin.tar.xz`
# - `scrybe-cli-installer.sh` (cargo-dist shell installer; quick-install path
#   documented in `INSTALL.md`)
# - `dist-manifest.json` (cargo-dist artifact-list manifest read by the
#   installer to resolve and verify per-target tarballs)
# - `SHA256SUMS.txt` (SHA256 manifest covering tarballs and installer)
#
# Each tarball contains the `scrybe` binary, `INSTALL.md`, `LICENSE`, and
# `README.md`. macOS artifacts are unsigned per `.docs/development-plan.md`
# §13.1; users strip the quarantine attribute as documented in INSTALL.md.

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write
  # `id-token: write` is required by `sigstore/cosign-installer` so the
  # release job can mint a short-lived OIDC token tied to this workflow
  # run. Cosign uses that token to obtain a Fulcio-issued certificate
  # and signs each release artifact keylessly. The certificate's SAN
  # records `https://github.com/Mathews-Tom/scrybe/.github/workflows/release.yml@<ref>`
  # so a downstream `cosign verify-blob` invocation can prove the asset
  # came from this workflow on this commit, without scrybe having to
  # manage a private key. See `INSTALL.md` "Verify a release with cosign".
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_DIST_VERSION: "0.25.1"

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
      is-release: ${{ steps.resolve-tag.outputs.is-release }}
    steps:
      - uses: actions/checkout@v4
      - name: resolve tag
        id: resolve-tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dispatch-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dist-plan
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      # cargo-dist 0.25 ships its binary as `dist`, not `cargo-dist`, so
      # `cargo dist <subcmd>` fails with "no such command: dist". Invoke
      # the binary directly. Same pattern applies to `dist build` below.
      - name: dist plan
        run: dist plan --output-format=human

  build:
    name: build (${{ matrix.target }})
    needs: plan
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    env:
      # Pin SOURCE_DATE_EPOCH and remap workspace paths so artifact bytes
      # do not depend on the runner's working directory or wall-clock at
      # build time. The bit-equality contract is verified on every PR
      # by `.github/workflows/reproducibility.yml`, which builds each
      # target twice from divergent workspace paths and asserts SHA256
      # equality across legs.
      SOURCE_DATE_EPOCH: "1714464000"
      RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=/build"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dist-build-${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      - name: dist build
        run: dist build --artifacts=local --target=${{ matrix.target }}
      - name: list artifacts
        run: ls -la target/distrib/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: target/distrib/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: release
    needs: [plan, build]
    if: needs.plan.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-staging
          pattern: dist-*
          merge-multiple: true
      - name: list staged artifacts
        run: ls -la dist-staging/
      # cargo-dist splits artifacts into "local" (per-target tarballs, built by
      # the matrix above) and "global" (cross-target outputs — installer
      # script, dist-manifest.json). The build matrix only emits local; the
      # shell installer asset that `INSTALL.md` and `README.md` document as
      # the quick-install path comes out of `dist build --artifacts=global`.
      # Run it here on the release runner and stage its output alongside the
      # downloaded tarballs so a single `gh release create` glob picks
      # everything up.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }},cargo-cyclonedx@0.5.7,cosign@2.4.1
      - name: dist build (global artifacts)
        run: dist build --artifacts=global
      - name: stage global artifacts alongside tarballs
        run: |
          ls -la target/distrib/
          cp -v target/distrib/* dist-staging/
      # CycloneDX SBOM covering the workspace dependency graph. Emitted
      # at release time (not in the build matrix) because it is a
      # cross-target manifest derived from `Cargo.lock`, not from any
      # individual tarball. Shipped as `scrybe-cli-sbom.cdx.json` so
      # downstream consumers running `cargo audit` / `osv-scanner`
      # against the SBOM can reproduce the workspace's vulnerability
      # posture without checking out source.
      - name: generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --override-filename scrybe-cli-sbom
          mv scrybe-cli-sbom.cdx.json dist-staging/scrybe-cli-sbom.cdx.json
          ls -la dist-staging/scrybe-cli-sbom.cdx.json
      - name: write SHA256 manifest
        working-directory: dist-staging
        run: |
          shopt -s nullglob
          : > SHA256SUMS.txt
          for f in *.tar.* *.zip *.sh *.cdx.json; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt
      # Cosign keyless signing covers SHA256SUMS.txt (the canonical
      # checksum manifest — verifying it transitively covers every
      # asset whose hash appears in the file) and the SBOM (consumed
      # standalone by supply-chain tools). Each `sign-blob` invocation
      # emits both the signature (`<asset>.sig`) and the Fulcio
      # certificate (`<asset>.pem`) so a verifier can reconstruct the
      # OIDC chain without contacting Sigstore. `--yes` accepts the
      # transparency-log prompt non-interactively; `cosign-experimental`
      # is no longer required as of cosign 2.x.
      - name: cosign sign release manifest + SBOM
        working-directory: dist-staging
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for asset in SHA256SUMS.txt scrybe-cli-sbom.cdx.json; do
            [ -e "$asset" ] || { echo "::error::missing $asset"; exit 1; }
            cosign sign-blob \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.pem" \
              "$asset"
          done
          ls -la *.sig *.pem
      - name: gh release create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Route the resolved tag through env so bash dereferences a variable
          # rather than having `${{ }}` template-substitution splice it into
          # the script body. Inline interpolation of a value an attacker can
          # influence (a tag name) is the textbook GitHub Actions command-
          # injection vector — the tag-pattern filter does not constrain
          # shell metacharacters because `*` matches them.
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          # `dist-staging/*` would also match the unpacked
          # `scrybe-cli-<target>/` working directories cargo-dist leaves
          # in target/distrib alongside the tarballs. `gh release create`
          # rejects directory paths with "is a directory" — the v0.1.0
          # first-attempt run hit exactly that. Restrict the upload to
          # regular files at depth 1 via `find -type f`.
          mapfile -t ASSETS < <(find dist-staging -maxdepth 1 -type f)
          printf 'staging file: %s\n' "${ASSETS[@]}"
          gh release create "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            "${ASSETS[@]}"
