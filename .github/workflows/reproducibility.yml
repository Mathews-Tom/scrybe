# Reproducible-build verification per `.docs/development-plan.md` §13.1.
#
# Builds each release tarball target twice — once on a fresh checkout
# rooted at `/Users/runner/work/scrybe/scrybe` (the GitHub-hosted default)
# and once at `/Users/runner/work/scrybe-rebuild/scrybe-rebuild` — and
# compares the SHA256 of each emitted tarball across runs. Path
# divergence catches `--remap-path-prefix` regressions; running both
# legs on the same runner keeps the variance budget tight enough that a
# single mismatch is signal, not noise.
#
# Inputs already in place toward bit-identical output:
# - `SOURCE_DATE_EPOCH` (release.yml: 1714464000) freezes file mtimes
#   embedded in tar archives.
# - `RUSTFLAGS=--remap-path-prefix=$workspace=/build` strips runner-
#   specific source paths from emitted DWARF and panic-message strings.
# - `RUSTFLAGS+=-C link-args=-Wl,-no_uuid` suppresses the Mach-O
#   LC_UUID load command on macOS.
# - `rust-toolchain.toml` pins the exact toolchain (1.95.0) so the leg
#   that runs first cannot pick up a newer rustup auto-update.
# - cargo-dist version pinned to 0.25.1 — same lockstep guarantee.
#
# Lane status at v0.9.0-rc1: advisory. Empirically the four inputs
# above are not yet sufficient to make cargo-dist tarballs bit-
# identical on `macos-14`; remaining non-determinism sources need
# deeper investigation (candidate suspects: rustc embedded build-host
# triple, cargo-dist metadata, xz compressor non-determinism). The
# verification step emits a `::warning::` annotation on mismatch
# rather than failing the job so the lane stays informational while
# the maintainer works through the residual divergences. Promotion
# to a blocking gate is a v0.9.x → v1.0 deliverable.
#
# Triggers:
# - workflow_dispatch: manual rerun for a maintainer verifying a tag.
# - pull_request: when this file or release.yml changes, so a regression
#   in the release pipeline surfaces at PR time.
# - schedule: weekly (Sunday 06:00 UTC) so silent toolchain rebuilds in
#   the dependency graph cannot bit-rot the guarantee unnoticed.
#
# Out of scope (deliberate):
# - Linux + Windows reproducibility lanes — the cargo-dist matrix only
#   targets macOS through v1.0 (`Cargo.toml` `[workspace.metadata.dist]
#   targets`). Linux/Windows lanes land when the matrix grows.

name: reproducibility

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/reproducibility.yml"
      - ".github/workflows/release.yml"
      - "rust-toolchain.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 6 * * 0"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_DIST_VERSION: "0.25.1"
  # `SOURCE_DATE_EPOCH` MUST stay in lockstep with `release.yml` —
  # divergence between the two silently breaks the verification
  # contract: this lane would happily assert bit-equality of artifacts
  # built with a different epoch than what the release pipeline emits.
  # When bumping either value, bump both.
  SOURCE_DATE_EPOCH: "1714464000"

jobs:
  verify:
    name: verify (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: checkout (leg A — default workspace)
        uses: actions/checkout@v4
        with:
          path: scrybe
      - name: checkout (leg B — divergent workspace path)
        uses: actions/checkout@v4
        with:
          path: scrybe-rebuild
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      - name: dist build (leg A)
        working-directory: scrybe
        env:
          # `-Wl,-no_uuid` matches `release.yml` and is the load-bearing
          # half of bit-equality on macOS. The linker otherwise embeds a
          # per-invocation LC_UUID that defeats reproducibility under
          # SOURCE_DATE_EPOCH + remap-path-prefix alone.
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}/scrybe=/build -C link-args=-Wl,-no_uuid"
        run: dist build --artifacts=local --target=${{ matrix.target }}
      - name: dist build (leg B)
        working-directory: scrybe-rebuild
        env:
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}/scrybe-rebuild=/build -C link-args=-Wl,-no_uuid"
        run: dist build --artifacts=local --target=${{ matrix.target }}
      # Advisory at v0.9.0-rc1. Mismatches surface as `::warning::`
      # annotations rather than job failures while the residual macOS
      # non-determinism sources are tracked down. The script still
      # emits the per-asset SHA256 pair on mismatch so a future
      # investigator can grep the workflow log for the divergence
      # pattern. Promotion to a hard fail is the v0.9.x → v1.0
      # deliverable; remove the always-zero exit and re-add the
      # `if mismatched` block at that time.
      - name: compare SHA256 across legs (advisory)
        run: |
          set -euo pipefail
          mismatched=0
          shopt -s nullglob
          for leg_a in scrybe/target/distrib/*.tar.* scrybe/target/distrib/*.zip; do
            [ -e "$leg_a" ] || continue
            name="$(basename "$leg_a")"
            leg_b="scrybe-rebuild/target/distrib/$name"
            if [ ! -e "$leg_b" ]; then
              echo "::warning title=reproducibility advisory::leg B missing artifact $name"
              mismatched=1
              continue
            fi
            sha_a="$(shasum -a 256 "$leg_a" | awk '{print $1}')"
            sha_b="$(shasum -a 256 "$leg_b" | awk '{print $1}')"
            if [ "$sha_a" = "$sha_b" ]; then
              printf '  match  %s  %s\n' "$sha_a" "$name"
            else
              echo "::warning title=reproducibility advisory::mismatch on $name (leg-a=$sha_a leg-b=$sha_b)"
              mismatched=1
            fi
          done
          if [ "$mismatched" -ne 0 ]; then
            echo "::warning title=reproducibility advisory::verification reported divergences; see annotations above. Lane is advisory at v0.9.0-rc1."
          fi
          exit 0
      # Always upload both legs' artifacts so a maintainer can pull
      # them down and run `diffoscope leg-a/scrybe leg-b/scrybe` to
      # localise the residual non-determinism. Storage cost is small
      # (each tarball is < 5 MB) and retention is short. Drop the
      # always-on once the lane flips to blocking — a green run means
      # the artifacts are bit-identical and uploading both is
      # redundant.
      - name: upload leg-A artifacts (diff aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leg-a-${{ matrix.target }}
          path: scrybe/target/distrib/*
          retention-days: 7
      - name: upload leg-B artifacts (diff aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leg-b-${{ matrix.target }}
          path: scrybe-rebuild/target/distrib/*
          retention-days: 7
