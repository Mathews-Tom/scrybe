name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo check (mac core-audio-tap feature)
        if: matrix.os == 'macos-14'
        run: cargo check -p scrybe-capture-mac --features core-audio-tap --all-targets
      - name: cargo clippy (mac core-audio-tap feature)
        if: matrix.os == 'macos-14'
        run: cargo clippy -p scrybe-capture-mac --features core-audio-tap --all-targets -- -D warnings
      - name: cargo test (lib, bin, integration, examples)
        run: cargo test --workspace --all-targets
      - name: cargo test (mac core-audio-tap feature, ignored hardware tests skipped)
        if: matrix.os == 'macos-14'
        run: cargo test -p scrybe-capture-mac --features core-audio-tap --all-targets
      - name: cargo test (doc)
        run: cargo test --workspace --doc
      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install prebuilt cargo-audit via taiki-e/install-action so the
      # audit job is decoupled from the workspace toolchain bump cycle.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # `cargo-audit` reads `~/.cargo/audit.toml`, not the workspace-
      # root `audit.toml` we ship as documentation. Pass `--ignore`
      # on the CLI to enforce the same ignores. The workspace
      # `audit.toml` carries the canonical rationale for each entry;
      # keep both lists in sync when adding or dropping ignores.
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0421

  deny:
    name: deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
          arguments: --all-features

  vet:
    name: vet (cargo-vet supply-chain — advisory)
    runs-on: ubuntu-latest
    # Advisory through v1.0. `cargo-vet` was wired up at v0.9.0-rc1
    # with standard upstream import feeds (Mozilla / Embark / Google /
    # Bytecode Alliance / ISRG / Zcash). Direct-dep audit entries land
    # incrementally through the v1.0.x stream; the lane stays
    # informational so a missing audit does not block PRs while the
    # maintainer works through the dependency graph. Promotion to a
    # blocking gate is the v1.0.x → v1.1 deliverable per
    # `.docs/development-plan.md` §13.1 ("cargo-vet audits committed
    # for every direct dep") and `MAINTENANCE.md` §5.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet@0.10.0
      # The runner exit-codes vet outputs and converts a non-zero
      # result into a `::warning::` annotation rather than a job
      # failure. Job-level `continue-on-error` makes the *workflow*
      # pass but leaves the *PR check* red, which reads as "broken"
      # in the GitHub UI; wrapping in a script keeps the surface
      # green while preserving the advisory signal in the workflow
      # log. Remove the wrapper at v1.0 when the lane flips to
      # blocking.
      - name: cargo vet check --locked (advisory)
        run: |
          set +e
          cargo vet check --locked
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::warning title=cargo-vet advisory::cargo vet check exited $rc; see supply-chain/audits.toml for the v0.9.x audit-pass plan"
          fi
          exit 0

  loc-budget:
    name: loc-budget (per-crate ceilings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: tokei
      - name: enforce per-crate LoC ceilings
        run: python3 scripts/check-loc-budget.py

  egress-audit:
    name: egress-audit (default-feature graph has no network crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: assert no network crates in scrybe-cli default build
        run: python3 scripts/check-egress-baseline.py

  bench-compile:
    name: bench-compile (criterion harness builds clean)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `cargo bench --no-run` builds every `[[bench]]` target without
      # running it. The full Tier-3 throughput-regression gate
      # (`docs/system-design.md` §11) lives on the self-hosted Mac
      # runner; GitHub-hosted CPUs are too noisy for absolute numbers.
      # This job catches bench bitrot — a refactor that breaks the
      # benchmark harness — on every PR.
      - name: cargo bench --no-run (workspace)
        run: cargo bench --workspace --no-run
      - name: cargo clippy on benches
        run: cargo clippy --workspace --benches -- -D warnings

  dist-plan:
    name: dist-plan (cargo-dist config valid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.25.1
      # cargo-dist 0.25 ships its binary as `dist`, not `cargo-dist`, so
      # `cargo dist plan` fails with "no such command: dist".
      - name: dist plan
        run: dist plan --output-format=human

  coverage:
    name: coverage (workspace + scrybe-core gate)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.6.21
      - name: workspace coverage gate (>= 80% lines)
        run: cargo llvm-cov --workspace --fail-under-lines 80 --summary-only
      - name: scrybe-core coverage gate (>= 90% lines)
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --package scrybe-core --fail-under-lines 90 --summary-only
      - name: emit lcov for upload
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --lcov --output-path lcov.info --summary-only
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14
