# cargo-deny configuration for scrybe.
#
# Per `.docs/development-plan.md` §15.1 and §16: every release tag is
# gated on `cargo deny check` passing across advisories, licenses, bans,
# and sources. Tuned for the workspace targets in `Cargo.toml`
# (macOS, Linux, Windows desktops; Android added at v0.5).

[graph]
all-features = false
no-default-features = false
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-pc-windows-msvc" },
]

[output]
feature-depth = 1

# Vulnerability advisories. RustSec database is the source of truth.
# `vulnerability` and `notice` are implicit `deny` in the v2 schema; we
# downgrade `unmaintained` and `unsound` to `warn` so cargo-deny does
# not fail builds on advisory categories that are informational rather
# than exploitable. This matches `cargo audit`'s default exit-code
# behaviour: warning-class advisories surface in CI logs without
# blocking landings.
[advisories]
version = 2
yanked = "warn"
ignore = []

# OSI/FSF-approved permissive licenses compatible with Apache-2.0 plus
# the small set of explicitly-allowed weak-copyleft and public-domain
# variants we have observed in the dependency tree as of 2026-04. New
# licenses must be added intentionally, not by accident.
[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
exceptions = [
    # `ring` ships its own non-SPDX license file blending OpenSSL,
    # ISC, and MIT. The cargo-deny upstream README documents this as
    # the canonical exception for any tree that pulls in `rustls`.
    { name = "ring", allow = ["LicenseRef-ring"] },
    # `unicode-ident` ships under Unicode-DFS-2016 + MIT/Apache-2.0;
    # its license file is matched by the SPDX ID below.
    { name = "unicode-ident", allow = ["Unicode-DFS-2016"] },
]

[[licenses.clarify]]
name = "ring"
expression = "LicenseRef-ring"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
# Crates with known maintenance or security concerns that we never want
# to depend on. Empty today; populated as the dependency tree changes.
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
