# cargo-deny configuration for scrybe.
#
# Per `.docs/development-plan.md` §15.1 and §16: every release tag is
# gated on `cargo deny check` passing across advisories, licenses, bans,
# and sources. Tuned for the workspace targets in `Cargo.toml`
# (macOS, Linux, Windows desktops; Android added at v0.5).

[graph]
all-features = false
no-default-features = false
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-pc-windows-msvc" },
]

[output]
feature-depth = 1

# Vulnerability advisories. RustSec database is the source of truth.
# In the v2 schema, `vulnerability`, `notice`, and `unsound` advisories
# are implicit hard denies and cannot be downgraded — only `yanked` and
# `unmaintained` remain configurable. `unmaintained = "workspace"`
# scopes the deny to direct workspace deps so a transitive crate going
# unmaintained between releases surfaces in logs without blocking a
# landing; the maintainer's response is to bump or replace, not to
# patch this file.
#
# The `ignore` list is the only escape hatch and every entry MUST cite
# why the advisory cannot be acted on now and what unblocks dropping
# the entry.
[advisories]
version = 2
yanked = "warn"
unmaintained = "workspace"
ignore = [
    # `git2 0.19 → 0.20` would resolve this advisory but pulls
    # transitive `icu_*` deps that require rustc 1.86; the workspace
    # `rust-toolchain.toml` pins 1.85.0. Re-evaluate the moment the
    # toolchain bumps. Tracked under `.docs/development-plan.md` §6.2
    # delivery item #4 (dependency pins).
    { id = "RUSTSEC-2026-0008", reason = "git2 0.19 unsound advisory; 0.20 upgrade blocked by rustc 1.85 toolchain pin." },
    # `glib 0.18.5` is pulled in transitively by `tray-icon 0.23 →
    # muda → gtk-rs 0.18` and only when the optional `cli-shell`
    # cargo feature is enabled (Linux desktop builds). The default
    # headless build does not link this graph at all. Upstream
    # `tray-icon` ≥ 0.24 is expected to migrate to gtk-rs 0.20 which
    # drops the unsound `VariantStrIter` impl. Re-evaluate when
    # `tray-icon` ships that bump.
    { id = "RUSTSEC-2024-0429", reason = "glib 0.18 VariantStrIter unsoundness, optional via tray-icon→muda→gtk-rs 0.18; cli-shell feature only." },
]

# OSI/FSF-approved permissive licenses compatible with Apache-2.0 plus
# the small set of explicitly-allowed weak-copyleft and public-domain
# variants we have observed in the dependency tree as of 2026-04. New
# licenses must be added intentionally, not by accident.
[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
exceptions = [
    # `ring` ships its own non-SPDX license file blending OpenSSL,
    # ISC, and MIT. The cargo-deny upstream README documents this as
    # the canonical exception for any tree that pulls in `rustls`.
    { name = "ring", allow = ["LicenseRef-ring"] },
    # `unicode-ident` ships under Unicode-DFS-2016 + MIT/Apache-2.0;
    # its license file is matched by the SPDX ID below.
    { name = "unicode-ident", allow = ["Unicode-DFS-2016"] },
]

[[licenses.clarify]]
name = "ring"
expression = "LicenseRef-ring"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
# Crates with known maintenance or security concerns that we never want
# to depend on. Empty today; populated as the dependency tree changes.
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
