# 20-clip multilingual regression corpus.
#
# This manifest defines the canonical clip set used by the multilingual
# WER regression in `scrybe-core/tests/multilingual_corpus.rs`. The
# audio files themselves are NOT committed — sourcing them requires
# attribution-aware acquisition per `provenance` below. The integration
# test skips when the audio is absent and runs the WER assertion when
# the environment variable `SCRYBE_MULTILINGUAL_CORPUS` points to a
# directory containing the named files.
#
# Acquisition protocol (maintainer responsibility):
#   1. Pick clips from the cited public-domain or CC-BY-licensed source.
#   2. Trim to the duration window listed in `duration_secs_max`.
#   3. Resample to 16 kHz mono PCM and save as `<id>.wav` under the
#      directory referenced by `SCRYBE_MULTILINGUAL_CORPUS`.
#   4. Verify SHA256 against the value below and update if a re-trim
#      changed it. The harness tolerates missing checksums (treats them
#      as "no integrity gate yet") to keep the scaffold usable while
#      the corpus is being assembled.
#
# Per `.docs/development-plan.md` §12 the assertion is WER ≤ 0.15 on
# `whisper-large-v3` for every clip. The harness records measured WER
# in `<root>/.bench/multilingual.<git-sha>.json` for diff against the
# previous release tag.

schema_version = 1

# Hindi
[[clips]]
id = "hi-01"
language = "hi"
duration_secs_max = 8.0
expected_text = "मुझे लगता है कि हमें अगली बैठक में इस पर चर्चा करनी चाहिए।"
provenance = "Common Voice 17.0 (CC0); see https://commonvoice.mozilla.org/hi/datasets"

[[clips]]
id = "hi-02"
language = "hi"
duration_secs_max = 8.0
